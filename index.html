<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaleci Miran: Geçilmez Duvar</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #2e7d32; margin: auto; border-bottom: 10px solid #555; }
        
        /* Kontrol Paneli */
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px #000; }
        #controls { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 20px; padding: 10px; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 15px; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }

        #goal-msg { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; color: #fbc02d; display: none; z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px;">KURTARIŞ: <span id="saves">0</span> | GOL: <span id="goals">0</span></div>
    <div id="status" style="color: #fbca03;">RAKİP ŞUTA HAZIRLANIYOR...</div>
</div>

<div id="goal-msg">ADAMSIN MİRAN! 🔥</div>

<canvas id="game"></canvas>

<div id="controls">
    <div class="btn" id="btnL">⬅️</div>
    <div class="btn" id="btnJump" style="background: #d32f2f;">⬆️</div>
    <div class="btn" id="btnR">➡️</div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 150;

    // Ses Efektleri (Yüksek Sesli)
    const cheerSnd = new Audio('https://www.soundjay.com/human/sounds/applause-01.mp3');
    const booSnd = new Audio('https://www.soundjay.com/human/sounds/fart-01.mp3'); // Basit bir efekt, istersen değiştirirsin

    // Oyun Değişkenleri
    let saves = 0, goals = 0;
    let kaleci = { x: canvas.width/2 - 40, y: canvas.height - 100, w: 80, h: 80, dy: 0, jumping: false };
    let ball = { x: canvas.width/2, y: 50, r: 15, dx: 0, dy: 0, active: false };
    let kale = { x: 20, y: canvas.height - 120, w: canvas.width - 40, h: 100 };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Saha ve Kale Çizimi
        ctx.strokeStyle = "white"; ctx.lineWidth = 8;
        ctx.strokeRect(kale.x, kale.y, kale.w, kale.h); // Dev Kale

        // Kaleci Miran (Sarı-Lacivert)
        ctx.fillStyle = "#fbca03"; 
        ctx.fillRect(kaleci.x, kaleci.y, kaleci.w, kaleci.h);
        ctx.strokeStyle = "#003366"; ctx.strokeRect(kaleci.x, kaleci.y, kaleci.w, kaleci.h);
        ctx.fillStyle = "white"; ctx.font = "12px Arial"; ctx.fillText("MİRAN", kaleci.x+20, kaleci.y+40);

        // Top
        if(ball.active) {
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "black"; ctx.stroke();
        }

        update();
        requestAnimationFrame(draw);
    }

    function update() {
        // Zıplama Fiziği
        if(kaleci.jumping) {
            kaleci.y += kaleci.dy;
            kaleci.dy += 0.8; // Yerçekimi
            if(kaleci.y >= canvas.height - 100) {
                kaleci.y = canvas.height - 100;
                kaleci.jumping = false;
            }
        }

        // Top Hareketi
        if(ball.active) {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Kurtarış Kontrolü
            if(ball.x > kaleci.x && ball.x < kaleci.x + kaleci.w && ball.y > kaleci.y && ball.y < kaleci.y + kaleci.h) {
                saves++;
                document.getElementById("saves").innerText = saves;
                ball.active = false;
                cheerSnd.play();
                if(saves % 5 === 0) showMessage();
                setTimeout(shootBall, 1500);
            }

            // Gol Kontrolü
            if(ball.y > canvas.height) {
                goals++;
                document.getElementById("goals").innerText = goals;
                ball.active = false;
                booSnd.play();
                setTimeout(shootBall, 1500);
            }
        }
    }

    function showMessage() {
        const msg = document.getElementById("goal-msg");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2000);
    }

    function shootBall() {
        ball.x = canvas.width / 2;
        ball.y = 100;
        ball.active = true;
        // Top kalenin içine rastgele gider
        ball.dx = (Math.random() - 0.5) * 10;
        ball.dy = 7 + (saves * 0.2); // Her kurtarışta hızlanır
        document.getElementById("status").innerText = "ŞUT GELDİ! TUT ONU!";
    }

    // Buton Kontrolleri
    document.getElementById("btnL").addEventListener("touchstart", () => { if(kaleci.x > kale.x) kaleci.x -= 40; });
    document.getElementById("btnR").addEventListener("touchstart", () => { if(kaleci.x < kale.x + kale.w - 80) kaleci.x += 40; });
    document.getElementById("btnJump").addEventListener("touchstart", () => {
        if(!kaleci.jumping) {
            kaleci.dy = -15;
            kaleci.jumping = true;
        }
    });

    // Klavye Desteği
    window.addEventListener("keydown", e => {
        if(e.key === "ArrowLeft" && kaleci.x > kale.x) kaleci.x -= 40;
        if(e.key === "ArrowRight" && kaleci.x < kale.x + kale.w - 80) kaleci.x += 40;
        if(e.key === "ArrowUp" && !kaleci.jumping) { kaleci.dy = -15; kaleci.jumping = true; }
    });

    setTimeout(shootBall, 2000);
    draw();
</script>
</body>
</html>
